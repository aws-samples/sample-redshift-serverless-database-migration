      Name: !Sub "${AWS::StackName}-GlueServiceRoleARN"

  LambdaFunctionName:
    Description: 'Name of the Lambda function'
    Value: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${FetchRedshiftTablesFunction}"
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionName"

  LambdaFunctionArn:
    Description: 'ARN of the Lambda function to fetch table list'
    Value: !GetAtt FetchRedshiftTablesFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"

  RedshiftViewsAndUsers:
    Description: 'Glue Job for Redshift users and views'
    Value: !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:job/${RedshiftViewsAndUsers}"
    Export:
      Name: !Sub "${AWS::StackName}-RedshiftViewsAndUsers"

  SecurityGroupId:
    Description: Security Group ID used for migration components
    Value: !GetAtt NetworkConfig.SecurityGroupId
    Export:
      Name: !Sub ${AWS::StackName}-SecurityGroupId

  SecurityGroupSelfReferenceStatus:
    Description: Status of self-referencing rule check
    Value: !GetAtt SecurityGroupCheck.Status

  VPCEndpoints:
    Description: VPC Endpoints (Created or Updated)
    Value: !Join [", ", !GetAtt VPCEndpointUpdate.EndpointIds]

  RedshiftAccessRoleArn:
    Description: ARN of the created IAM role
    Value: !GetAtt RedshiftAccessIamRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-redshift-access-role-arn

  RedshiftAccessRoleName:
    Description: Name of the created IAM role
    Value: !Ref RedshiftAccessIamRole
    Export:
      Name: !Sub ${AWS::StackName}-redshift-access-role-name
