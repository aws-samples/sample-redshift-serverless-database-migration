  NetworkConfigFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.13
      Timeout: 300
      Role: !GetAtt NetworkConfigFunctionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import traceback
          import json
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def get_ssm_parameter(ssm_client, param_name):
              try:
                  logger.info(f"Attempting to get SSM parameter: {param_name}")
                  response = ssm_client.get_parameter(Name=param_name)
                  logger.info(f"Successfully retrieved parameter {param_name}: {response['Parameter']['Value']}")
                  return response['Parameter']['Value']
              except Exception as e:
                  logger.error(f"Error getting SSM parameter {param_name}: {str(e)}")
                  raise

          def get_ssm_parameters(ssm_client, params):
              """Get multiple SSM parameters and combine their values"""
              try:
                  all_values = []
                  param_names = params.split(',')
                  for param_name in param_names:
                      param_name = param_name.strip()
                      if param_name:  # Only process non-empty parameter names
                          value = get_ssm_parameter(ssm_client, param_name)
                          if value:
                              all_values.extend([v.strip() for v in value.split(',') if v.strip()])
                  return list(set(all_values))  # Remove duplicates
              except Exception as e:
                  logger.error(f"Error getting SSM parameters {params}: {str(e)}")
                  raise

          def filter_security_groups_by_vpc(ec2_client, security_group_ids, vpc_id):
              """Filter security groups to only include those in the specified VPC"""
              try:
                  response = ec2_client.describe_security_groups(
                      GroupIds=security_group_ids
                  )
                  vpc_security_groups = [
                      sg['GroupId'] for sg in response['SecurityGroups']
                      if sg['VpcId'] == vpc_id
                  ]
                  logger.info(f"Security groups in VPC {vpc_id}: {vpc_security_groups}")
                  return vpc_security_groups
              except Exception as e:
                  logger.error(f"Error filtering security groups: {str(e)}")
                  raise

          def get_redshift_security_groups(ec2_client, vpc_id):
              """Get Redshift security groups from the specified VPC"""
              try:
                  response = ec2_client.describe_security_groups(
                      Filters=[
                          {'Name': 'vpc-id', 'Values': [vpc_id]},
                          {'Name': 'group-name', 'Values': ['*redshift*']}
                      ]
                  )
                  redshift_sgs = [sg['GroupId'] for sg in response['SecurityGroups']]
                  logger.info(f"Redshift security groups in VPC {vpc_id}: {redshift_sgs}")
                  return redshift_sgs
              except Exception as e:
                  logger.error(f"Error getting Redshift security groups: {str(e)}")
                  raise

          def add_ingress_rules(ec2_client, security_group_ids, redshift_sgs, port):
              """Add ingress rules for security groups"""
              for sg_id in security_group_ids:
                  logger.info(f"Adding ingress rules for security group: {sg_id}")
                  try:
                      ec2_client.authorize_security_group_ingress(
                          GroupId=sg_id,
                          IpPermissions=[{
                              'IpProtocol': 'tcp',
                              'FromPort': port,
                              'ToPort': port,
                              'UserIdGroupPairs': [{
                                  'GroupId': rs_sg,
                                  'Description': f'Allow Redshift access on port {port}'
                              } for rs_sg in redshift_sgs]
                          }]
                      )
                      logger.info(f"Successfully added ingress rules for {sg_id}")
                  except ec2_client.exceptions.ClientError as e:
                      if 'InvalidPermission.Duplicate' in str(e):
                          logger.info(f"Rules already exist for {sg_id}, skipping")
                      else:
                          raise

          def validate_subnets(ec2_client, subnet_ids, vpc_id):
              """Validate that subnets exist and belong to the specified VPC"""
              try:
                  response = ec2_client.describe_subnets(
                      SubnetIds=subnet_ids
                  )
                  valid_subnets = [
                      subnet['SubnetId']
                      for subnet in response['Subnets']
                      if subnet['VpcId'] == vpc_id
                  ]
                  logger.info(f"Valid subnets in VPC {vpc_id}: {valid_subnets}")
                  return valid_subnets
              except Exception as e:
                  logger.error(f"Error validating subnets: {str(e)}")
                  raise

          def handler(event, context):
              logger.info(f"Event received: {json.dumps(event, indent=2)}")

              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      # Initialize clients
                      ssm = boto3.client('ssm')
                      ec2 = boto3.client('ec2')

                      # Get parameters
                      sg_param_name = event['ResourceProperties']['SecurityGroupSSM']
                      subnet_param_name = event['ResourceProperties']['SubnetSSM']
                      vpc_param_name = event['ResourceProperties']['VpcSSM']
                      port = int(event['ResourceProperties'].get('RedshiftServerlessPort', 5439))

                      # Get values from SSM
                      sg_ids_str = get_ssm_parameter(ssm, sg_param_name)
                      #subnet_ids_str = get_ssm_parameter(ssm, subnet_param_name)
                      subnet_ids = get_ssm_parameters(ssm, subnet_param_name)
                      vpc_id = get_ssm_parameter(ssm, vpc_param_name)

                      # Parse security group IDs
                      all_security_group_ids = [sg.strip() for sg in sg_ids_str.split(',') if sg.strip()]

                      # Filter security groups by VPC
                      security_group_ids = filter_security_groups_by_vpc(ec2, all_security_group_ids, vpc_id)
                      if not security_group_ids:
                          raise Exception(f"No security groups found in VPC {vpc_id}")

                      # Validate subnets
                      valid_subnet_ids = validate_subnets(ec2, subnet_ids, vpc_id)
                      if not valid_subnet_ids:
                          raise Exception(f"No valid subnets found in VPC {vpc_id}")

                      # Get Redshift security groups in the same VPC
                      redshift_sgs = get_redshift_security_groups(ec2, vpc_id)
                      if not redshift_sgs:
                          logger.warning(f"No Redshift security groups found in VPC {vpc_id}")

                      # Add ingress rules
                      if redshift_sgs:
                          add_ingress_rules(ec2, security_group_ids, redshift_sgs, port)

                      response_data = {
                          'SecurityGroupId': security_group_ids[0],
                          'SecurityGroupIds': security_group_ids,
                          'SubnetIds': subnet_ids,
                          'VpcId': vpc_id
                      }

                      logger.info(f"Sending success response: {json.dumps(response_data, indent=2)}")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

                  elif event['RequestType'] == 'Delete':
                      logger.info("Delete request - sending success response")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  else:
                      raise Exception(f"Unexpected request type: {event['RequestType']}")

              except Exception as e:
                  error_msg = f"Error in handler: {str(e)}"
                  logger.error(error_msg)
                  logger.error(f"Traceback: {traceback.format_exc()}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": error_msg})

