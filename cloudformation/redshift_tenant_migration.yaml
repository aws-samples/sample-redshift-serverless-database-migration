      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import time
          import traceback
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def get_ssm_parameter(ssm_client, param_name):
              """Get parameter from SSM with validation"""
              try:
                  logger.info(f"Getting SSM parameter: {param_name}")
                  response = ssm_client.get_parameter(Name=param_name)
                  value = response['Parameter']['Value']
                  if not value:
                      raise ValueError(f"Empty value for SSM parameter: {param_name}")
                  logger.info(f"Successfully retrieved SSM parameter: {param_name}")
                  return value
              except Exception as e:
                  logger.error(f"Error getting SSM parameter: {str(e)}")
                  logger.error(f"Traceback: {traceback.format_exc()}")
                  raise

          def check_and_add_self_referencing_rule(sg_ids):
              """Check and add self-referencing rule with retries"""
              if isinstance(sg_ids, str):
                  sg_ids = [sg.strip() for sg in sg_ids.split(',')]

              logger.info(f"Processing security groups: {sg_ids}")
              results = []

              for sg_id in sg_ids:
                  max_retries = 3
                  retry_delay = 2

                  for attempt in range(max_retries):
                      try:
                          logger.info(f"Checking security group {sg_id} (attempt {attempt + 1})")
                          ec2 = boto3.client('ec2')

                          # Validate security group exists
                          response = ec2.describe_security_groups(GroupIds=[sg_id])
                          if not response['SecurityGroups']:
                              raise ValueError(f"Security group {sg_id} not found")

                          sg = response['SecurityGroups'][0]
                          has_self_rule = False

                          # Check existing rules
                          for rule in sg['IpPermissions']:
                              if rule.get('IpProtocol') == '-1':
                                  for pair in rule.get('UserIdGroupPairs', []):
                                      if pair['GroupId'] == sg_id:
                                          has_self_rule = True
                                          logger.info(f"Self-referencing rule already exists for {sg_id}")
                                          break

                          # Add rule if needed
                          if not has_self_rule:
                              logger.info(f"Adding self-referencing rule to {sg_id}")
                              ec2.authorize_security_group_ingress(
                                  GroupId=sg_id,
                                  IpPermissions=[{
                                      'IpProtocol': '-1',
                                      'FromPort': -1,
                                      'ToPort': -1,
                                      'UserIdGroupPairs': [{
                                          'GroupId': sg_id,
                                          'Description': 'Allow all traffic from self'
                                      }]
                                  }]
                              )
                              logger.info(f"Successfully added self-referencing rule to {sg_id}")

                          results.append({'SecurityGroupId': sg_id, 'Success': True})
                          break  # Break retry loop if successful

                      except Exception as e:
                          if attempt == max_retries - 1:
                              logger.error(f"Final attempt failed for {sg_id}: {str(e)}")
                              logger.error(f"Traceback: {traceback.format_exc()}")
                              results.append({'SecurityGroupId': sg_id, 'Success': False, 'Error': str(e)})
                          else:
                              logger.warning(f"Attempt {attempt + 1} failed for {sg_id}, retrying in {retry_delay} seconds")
                              time.sleep(retry_delay)

              return results

          def handler(event, context):
              logger.info(f"Event received: {event}")
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      ssm = boto3.client('ssm')
                      param_name = event['ResourceProperties']['SecurityGroupSSM']

                      # Get and validate security group IDs
                      sg_ids = get_ssm_parameter(ssm, param_name)

                      results = check_and_add_self_referencing_rule(sg_ids)

                      # Check if all operations were successful
                      all_success = all(result['Success'] for result in results)

                      response_data = {
                          'SecurityGroupId': sg_ids,  # Keep original string for backward compatibility
                          'SecurityGroupIds': [r['SecurityGroupId'] for r in results],
                          'Status': 'Success' if all_success else 'Failed',
                          'Results': results
                      }

                      logger.info(f"Sending response: {response_data}")
                      cfnresponse.send(event, context,
                          cfnresponse.SUCCESS if all_success else cfnresponse.FAILED,
                          response_data)
                  else:
                      logger.info(f"Request type is {event['RequestType']}, sending success response")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  error_msg = f"Error in handler: {str(e)}"
                  logger.error(error_msg)
                  logger.error(f"Traceback: {traceback.format_exc()}")
                  cfnresponse.send(event, context, cfnresponse.FAILED,
                                 {"Error": error_msg})
