  CollectFailedTablesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-collect-failed-tables"
      Runtime: python3.13
      Handler: collect_failed_tables.handler
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref BucketName
        S3Key: redshift-tenant-migration/lambda/collect_failed_tables.zip
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucketName

  StatesExecutionRole:
    Type: AWS::IAM::Role
    DependsOn:
      - FetchRedshiftTablesFunction
      - StepFunctionsLogGroup
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StepFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Add this new statement for Step Functions execution
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource:
                  - !Join ["", ["arn:aws:states:", !Ref "AWS::Region", ":", !Ref "AWS::AccountId", ":stateMachine:*"]]
              # Existing statements below
              - Effect: Allow
                Action:
                  - glue:StartJobRun
                  - glue:GetJobRun
                  - glue:BatchStopJobRun
                Resource:
                  - !Join ["", ["arn:aws:glue:", !Ref "AWS::Region", ":", !Ref "AWS::AccountId", ":job/", !Ref TenantPythonShellJob]]
                  - !Join ["", ["arn:aws:glue:", !Ref "AWS::Region", ":", !Ref "AWS::AccountId", ":job/", !Ref TenantSparkJob]]
                  - !Join ["", ["arn:aws:glue:", !Ref "AWS::Region", ":", !Ref "AWS::AccountId", ":job/", !Ref RedshiftViewsAndUsers]]
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt FetchRedshiftTablesFunction.Arn
                  - !GetAtt CollectFailedTablesFunction.Arn

              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref 'AWS::Region'

              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt StepFunctionsLogGroup.Arn
                  - !Join ["", [!GetAtt StepFunctionsLogGroup.Arn, ":*"]]

              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt GlueCloudWatchKMSKey.Arn

  MigrationStateMachine:
    Type: AWS::StepFunctions::StateMachine
    DependsOn:
      - StatesExecutionRole
      - FetchRedshiftTablesFunction
      - GlueConnection
    Properties:
      RoleArn: !GetAtt StatesExecutionRole.Arn
      Definition:
        Comment: "A description of my state machine"
        StartAt: "CreateSchemaObjects"
        States:
          "CreateSchemaObjects":
            Type: Task
            Resource: "arn:aws:states:::glue:startJobRun.sync"
            Parameters:
              JobName: !Ref TenantPythonShellJob
              Arguments:
                "--SCHEMAS.$": "$.SCHEMAS"
                "--SOURCE_SECRET_ARN.$": "$.SOURCE_SECRET_ARN"
                "--TARGET_SECRET_ARN.$": "$.TARGET_SECRET_ARN"
                "--TENANT_NAME.$": "$.TENANT_NAME"
            Next: "Lambda Invoke"
            ResultPath: "$.null"

          "Lambda Invoke":
            Type: Task
            Resource: "arn:aws:states:::lambda:invoke"
            Parameters:
              FunctionName: !GetAtt FetchRedshiftTablesFunction.Arn
              Payload:
                "SCHEMAS.$": "$.SCHEMAS"
                "SOURCE_SECRET_ARN.$": "$.SOURCE_SECRET_ARN"
                "TARGET_SECRET_ARN.$": "$.TARGET_SECRET_ARN"
                "TENANT_NAME.$": "$.TENANT_NAME"
            Retry:
              - ErrorEquals:
                  - Lambda.ServiceException
                  - Lambda.AWSLambdaException
                  - Lambda.SdkClientException
                  - Lambda.TooManyRequestsException
                IntervalSeconds: 1
                MaxAttempts: 3
                BackoffRate: 2
                JitterStrategy: "FULL"
            Next: "Map"
            ResultPath: "$.LambdaResult"

          "Map":
            Type: Map
            ItemsPath: "$.LambdaResult.Payload.Payload"
            ItemProcessor:
              ProcessorConfig:
                Mode: "INLINE"
              StartAt: "InvokeGlueJobForTable"
              States:
                "InvokeGlueJobForTable":
                  Type: Task
                  Resource: "arn:aws:states:::glue:startJobRun.sync"
                  Parameters:
                    JobName: !Ref TenantSparkJob
                    Arguments:
                      "--SCHEMAS.$": "$.SCHEMAS"
                      "--TABLE_NAME.$": "$.TABLE_NAME"
                      "--SOURCE_SECRET_ARN.$": "$.SOURCE_SECRET_ARN"
                      "--TARGET_SECRET_ARN.$": "$.TARGET_SECRET_ARN"
                  Retry:
                    - ErrorEquals:
                        - Glue.AWSGlueException
                        - Glue.ConcurrentRunsExceededException
                      IntervalSeconds: 30
                      MaxAttempts: 2
                      BackoffRate: 2
                      JitterStrategy: "FULL"
                  Catch:
                    - ErrorEquals:
                        - States.ALL
                      ResultPath: "$.error"
                      Next: "HandleError"
                  Next: "HandleSuccess"
                  ResultPath: "$.glueResult"

                "HandleSuccess":
                  Type: Pass
                  Parameters:
                    status: "succeeded"
                    "table.$": "$.TABLE_NAME"
                    "schema.$": "$.SCHEMAS"
                  End: true

                "HandleError":
                  Type: Fail
                  Error: "TableMigrationFailed"
                  CausePath: "States.Format('table={}, schema={}, error={}, cause={}', $.TABLE_NAME, $.SCHEMAS, $.error.Error, $.error.Cause)"
            MaxConcurrency: 10
            ToleratedFailurePercentage: 20
            ResultPath: "$.MapResults"
            Catch:
              - ErrorEquals:
                  - States.ExceedToleratedFailureThreshold
                ResultPath: "$.MapError"
                Next: "CollectFailedTablesOnThresholdBreach"
            Next: "CollectFailedTables"

          "CollectFailedTables":
            Type: Task
            Resource: "arn:aws:states:::lambda:invoke"
            Parameters:
              FunctionName: !GetAtt CollectFailedTablesFunction.Arn
              Payload:
                "MapResults.$": "$.MapResults"
                "SCHEMAS.$": "$.SCHEMAS"
                "TENANT_NAME.$": "$.TENANT_NAME"
                "SOURCE_SECRET_ARN.$": "$.SOURCE_SECRET_ARN"
                "TARGET_SECRET_ARN.$": "$.TARGET_SECRET_ARN"
            Retry:
              - ErrorEquals:
                  - Lambda.ServiceException
                  - Lambda.AWSLambdaException
                  - Lambda.SdkClientException
                IntervalSeconds: 2
                MaxAttempts: 2
                BackoffRate: 2
            ResultPath: "$.FailedTablesResult"
            Next: "RefreshMaterializedViews"

          "CollectFailedTablesOnThresholdBreach":
            Type: Task
            Resource: "arn:aws:states:::lambda:invoke"
            Parameters:
              FunctionName: !GetAtt CollectFailedTablesFunction.Arn
              Payload:
                "MapResults.$": "$.MapResults"
                "SCHEMAS.$": "$.SCHEMAS"
                "TENANT_NAME.$": "$.TENANT_NAME"
                "SOURCE_SECRET_ARN.$": "$.SOURCE_SECRET_ARN"
                "TARGET_SECRET_ARN.$": "$.TARGET_SECRET_ARN"
            Retry:
              - ErrorEquals:
                  - Lambda.ServiceException
                  - Lambda.AWSLambdaException
                  - Lambda.SdkClientException
                IntervalSeconds: 2
                MaxAttempts: 2
                BackoffRate: 2
            ResultPath: "$.FailedTablesResult"
            Next: "MigrationFailedReport"

          "MigrationFailedReport":
            Type: Pass
            Parameters:
              "migration_summary":
                "status": "FAILED - exceeded 20% table failure threshold"
                "failed_count.$": "$.FailedTablesResult.Payload.failed_count"
                "total_tables.$": "$.FailedTablesResult.Payload.total_tables"
                "failed_tables.$": "$.FailedTablesResult.Payload.failed_tables"
                "report_location.$": "$.FailedTablesResult.Payload.report_location"
                "retry_input_location.$": "$.FailedTablesResult.Payload.retry_input_location"
                "message": "More than 20% of tables failed. Download retry_failed_tables.json from S3 and use it to re-run only the failed tables."
            End: true

          "RefreshMaterializedViews":
            Type: Task
            Resource: "arn:aws:states:::glue:startJobRun.sync"
            Parameters:
              JobName: !Ref RedshiftViewsAndUsers
              Arguments:
                "--SCHEMAS.$": "$.SCHEMAS"
                "--SOURCE_SECRET_ARN.$": "$.SOURCE_SECRET_ARN"
                "--TARGET_SECRET_ARN.$": "$.TARGET_SECRET_ARN"
                "--TENANT_NAME.$": "$.TENANT_NAME"
            ResultPath: "$.ViewsResult"
            Next: "GenerateMigrationReport"

          "GenerateMigrationReport":
            Type: Pass
            Parameters:
              "migration_summary":
                "status": "completed"
                "schemas.$": "$.SCHEMAS"
                "tenant.$": "$.TENANT_NAME"
                "total_tables.$": "$.FailedTablesResult.Payload.total_tables"
                "succeeded_count.$": "$.FailedTablesResult.Payload.succeeded_count"
                "failed_count.$": "$.FailedTablesResult.Payload.failed_count"
                "failed_tables.$": "$.FailedTablesResult.Payload.failed_tables"
                "report_location.$": "$.FailedTablesResult.Payload.report_location"
                "retry_input_location.$": "$.FailedTablesResult.Payload.retry_input_location"
                "views_refresh": "completed"
            End: true

      StateMachineType: STANDARD
      LoggingConfiguration:
        Level: ALL
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StepFunctionsLogGroup.Arn


  # Create the log group with encryption
  StepFunctionsLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: !Sub "/aws/stepfunctions/${AWS::StackName}"
        RetentionInDays: 30
        KmsKeyId: !GetAtt GlueCloudWatchKMSKey.Arn

  # S3 Lifecycle Policy — Auto-expire intermediate UNLOAD data after 7 days
  # Addresses T10 (stale data exposure) by ensuring intermediate data does not persist indefinitely
  S3LifecyclePolicyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-s3-lifecycle-policy"
      Runtime: python3.13
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt S3LifecyclePolicyRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      bucket_name = event['ResourceProperties']['BucketName']
                      expiration_days = int(event['ResourceProperties'].get('ExpirationDays', 7))

                      s3 = boto3.client('s3')
                      s3.put_bucket_lifecycle_configuration(
                          Bucket=bucket_name,
                          LifecycleConfiguration={
                              'Rules': [
                                  {
                                      'ID': 'ExpireUnloadData',
                                      'Status': 'Enabled',
                                      'Filter': {'Prefix': 'unload/'},
                                      'Expiration': {'Days': expiration_days},
                                      'NoncurrentVersionExpiration': {'NoncurrentDays': 1}
                                  },
                                  {
                                      'ID': 'ExpireTemporaryData',
                                      'Status': 'Enabled',
                                      'Filter': {'Prefix': 'temporary/'},
                                      'Expiration': {'Days': 3},
                                      'NoncurrentVersionExpiration': {'NoncurrentDays': 1}
                                  }
                              ]
                          }
                      )
                      logger.info(f"Lifecycle policy applied to {bucket_name}")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {'BucketName': bucket_name})
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  logger.error(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})

  S3LifecyclePolicyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3LifecyclePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                Resource:
                  - !Sub "arn:aws:s3:::${DataBucketName}"

  S3LifecyclePolicyCustomResource:
    Type: Custom::S3LifecyclePolicy
    DependsOn: S3LifecyclePolicyFunction
    Properties:
      ServiceToken: !GetAtt S3LifecyclePolicyFunction.Arn
      BucketName: !Ref DataBucketName
      ExpirationDays: 7

Outputs:
  StateMachineArn:
    Description: "ARN of the State Machine"
    Value: !Ref MigrationStateMachine
