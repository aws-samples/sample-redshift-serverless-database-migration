      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          import traceback
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def get_supported_azs_for_service(ec2_client, service_name):
              """Get AZs supported by the VPC endpoint service"""
              try:
                  response = ec2_client.describe_vpc_endpoint_services(
                      ServiceNames=[service_name]
                  )
                  if response['ServiceDetails']:
                      return set(response['ServiceDetails'][0]['AvailabilityZones'])
              except Exception as e:
                  logger.error(f"Error getting supported AZs for {service_name}: {str(e)}")
                  return set()
              return set()

          def select_supported_subnets(ec2_client, subnet_ids, service_name):
              """Select one subnet per AZ, but only from supported AZs"""
              supported_azs = get_supported_azs_for_service(ec2_client, service_name)
              logger.info(f"Supported AZs for {service_name}: {supported_azs}")

              subnet_az_map = get_subnet_az_mapping(ec2_client, subnet_ids)

              selected_subnets = []
              used_azs = set()

              for subnet_id, az in subnet_az_map.items():
                  if az in supported_azs and az not in used_azs:
                      selected_subnets.append(subnet_id)
                      used_azs.add(az)

              logger.info(f"Selected subnets for {service_name}: {selected_subnets}")
              return selected_subnets

          def ensure_ec2_endpoint(ec2_client, vpc_id, subnet_ids, security_group_id, region):
              """Ensure EC2 endpoint exists"""
              ec2_service = f"com.amazonaws.{region}.ec2"
              try:
                  response = ec2_client.describe_vpc_endpoints(
                      Filters=[
                          {'Name': 'vpc-id', 'Values': [vpc_id]},
                          {'Name': 'service-name', 'Values': [ec2_service]}
                      ]
                  )

                  if not response['VpcEndpoints']:
                      logger.info("Creating EC2 VPC endpoint...")
                      ec2_client.create_vpc_endpoint(
                          VpcEndpointType='Interface',
                          VpcId=vpc_id,
                          ServiceName=ec2_service,
                          SubnetIds=subnet_ids if isinstance(subnet_ids, list) else subnet_ids.split(','),
                          SecurityGroupIds=[security_group_id],
                          PrivateDnsEnabled=True
                      )
                      logger.info("EC2 VPC endpoint created")
              except Exception as e:
                  logger.error(f"Error ensuring EC2 endpoint: {str(e)}")
                  raise

          def get_subnet_az_mapping(ec2_client, subnet_ids):
              """Get mapping of subnet IDs to their Availability Zones"""
              try:
                  response = ec2_client.describe_subnets(SubnetIds=subnet_ids)
                  return {subnet['SubnetId']: subnet['AvailabilityZone']
                          for subnet in response['Subnets']}
              except Exception as e:
                  logger.error(f"Error getting subnet AZ mapping: {str(e)}")
                  raise

          def select_one_subnet_per_az(ec2_client, subnet_ids):
              """Select one subnet per AZ from the provided subnet IDs"""
              subnet_az_map = get_subnet_az_mapping(ec2_client, subnet_ids)
              selected_subnets = []
              used_azs = set()

              for subnet_id, az in subnet_az_map.items():
                  if az not in used_azs:
                      selected_subnets.append(subnet_id)
                      used_azs.add(az)

              return selected_subnets

          def handler(event, context):
              logger.info(f"Event received: {json.dumps(event, indent=2)}")
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      logger.info("Processing Create/Update request")
                      ec2 = boto3.client('ec2')

                      props = event.get('ResourceProperties', {})
                      logger.info(f"All properties: {json.dumps(props, indent=2)}")

                      vpc_id = props.get('VpcId')
                      security_group_id = props.get('SecurityGroupId')
                      region = props.get('Region')
                      subnet_ids = props.get('SubnetIds')

                      #ensure_ec2_endpoint(ec2, vpc_id, subnet_ids, security_group_id, region)

                      if not all([vpc_id, security_group_id, region, subnet_ids]):
                          raise ValueError(f"Missing required properties. VpcId: {vpc_id}, SecurityGroupId: {security_group_id}, Region: {region}, SubnetIds: {subnet_ids}")

                      logger.info(f"Properties extracted - VPC: {vpc_id}, SG: {security_group_id}, Region: {region}, Subnets: {subnet_ids}")

                      if isinstance(subnet_ids, str):
                          subnet_ids = subnet_ids.split(',')

                      filtered_subnet_ids = select_one_subnet_per_az(ec2, subnet_ids)
                      logger.info(f"Filtered subnets (one per AZ): {filtered_subnet_ids}")

                      services = [
                          f"com.amazonaws.{region}.sts",
                          f"com.amazonaws.{region}.secretsmanager",
                          f"com.amazonaws.{region}.redshift-serverless",
                          f"com.amazonaws.{region}.ssm",
                          f"com.amazonaws.{region}.lambda",
                          f"com.amazonaws.{region}.cloudformation",
                          f"com.amazonaws.{region}.redshift"

                      ]
                      logger.info(f"Services to process: {services}")

                      logger.info("Describing existing VPC endpoints...")
                      response = ec2.describe_vpc_endpoints(
                          Filters=[
                              {'Name': 'vpc-id', 'Values': [vpc_id]},
                              {'Name': 'service-name', 'Values': services}
                          ]
                      )

                      existing_endpoints = {
                          endpoint['ServiceName']: endpoint['VpcEndpointId']
                          for endpoint in response['VpcEndpoints']
                      }
                      logger.info(f"Existing endpoints: {existing_endpoints}")

                      endpoint_ids = []

                      for service in services:
                          logger.info(f"Processing service: {service}")
                          if service in existing_endpoints:
                              endpoint_id = existing_endpoints[service]
                              logger.info(f"Updating existing endpoint {endpoint_id}")
                              try:
                                  ec2.modify_vpc_endpoint(
                                      VpcEndpointId=endpoint_id,
                                      AddSecurityGroupIds=[security_group_id]
                                  )
                                  endpoint_ids.append(endpoint_id)
                                  logger.info(f"Successfully updated endpoint {endpoint_id}")
                              except Exception as e:
                                  logger.error(f"Error updating endpoint {endpoint_id}: {str(e)}")
                                  logger.error(f"Traceback: {traceback.format_exc()}")
                                  raise
                          else:
                              logger.info(f"Creating new endpoint for {service}")
                              service_supported_subnets = select_supported_subnets(ec2, filtered_subnet_ids, service)
                              try:
                                  response = ec2.create_vpc_endpoint(
                                      VpcEndpointType='Interface',
                                      VpcId=vpc_id,
                                      ServiceName=service,
                                      SubnetIds=service_supported_subnets,
                                      SecurityGroupIds=[security_group_id],
                                      PrivateDnsEnabled=True
                                  )
                                  new_endpoint_id = response['VpcEndpoint']['VpcEndpointId']
                                  endpoint_ids.append(new_endpoint_id)
                                  logger.info(f"Successfully created endpoint {new_endpoint_id}")
                              except Exception as e:
                                  logger.error(f"Error creating endpoint for {service}: {str(e)}")
                                  logger.error(f"Traceback: {traceback.format_exc()}")
                                  raise

                      response_data = {'EndpointIds': endpoint_ids}
                      logger.info(f"Sending success response: {response_data}")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  else:
                      logger.info(f"Request type is {event['RequestType']}, sending success response")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {'EndpointIds': []})

              except Exception as e:
                  error_msg = f"Error in handler: {str(e)}"
                  logger.error(error_msg)
                  logger.error(f"Traceback: {traceback.format_exc()}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})


      Runtime: python3.13
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt NetworkConfig.SecurityGroupId
        SubnetIds: !GetAtt NetworkConfig.SubnetIds


  VPCEndpointUpdate:
