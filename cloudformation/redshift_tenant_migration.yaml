      SecurityGroupId: !GetAtt NetworkConfig.SecurityGroupId
      SubnetIds: !GetAtt NetworkConfig.SubnetIds




  RedshiftIngressRulesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"


  GlueConnectionFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.13
      Timeout: 300
      Role: !GetAtt GlueConnectionFunctionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      subnet_id = event['ResourceProperties']['SubnetId']

                      # Get subnet AZ
                      ec2 = boto3.client('ec2')
                      response = ec2.describe_subnets(SubnetIds=[subnet_id])
                      az = response['Subnets'][0]['AvailabilityZone']

                      response_data = {
                          'AvailabilityZone': az,
                          'SubnetId': subnet_id
                      }

                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  logger.error(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt NetworkConfig.SecurityGroupId
        SubnetIds: !GetAtt NetworkConfig.SubnetIds



  GlueConnectionFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2AndVPCAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # EC2 Describe Actions
              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeInstances
                Resource: "*"

              # Network Interface Actions
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:AttachNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"


  GlueConnectionSubnet:
