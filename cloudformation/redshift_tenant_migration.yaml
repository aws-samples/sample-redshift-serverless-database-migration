AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Redshift tenant Migration and Schemas'

Parameters:

  BucketName:
    Type: String
    Description: Name for the S3 bucket for storing code artifacts
    AllowedPattern: '^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name (3-63 chars, lowercase, numbers, hyphens, dots)

  DataBucketName:
    Type: String
    Description: Name for the S3 bucket for storing Redshift data. Bucket should contain unload and temporary folders
    AllowedPattern: '^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name (3-63 chars, lowercase, numbers, hyphens, dots)

  TargetSecretArn:
    Type: String
    Description: ARN of the target Redshift secret in Secrets Manager
    AllowedPattern: '^arn:aws:secretsmanager:[a-z0-9\-]+:\d{12}:secret:.+$'
    ConstraintDescription: Must be a valid Secrets Manager ARN

  SourceSecretArn:
    Type: String
    Description: ARN of the source Redshift secret in Secrets Manager
    AllowedPattern: '^arn:aws:secretsmanager:[a-z0-9\-]+:\d{12}:secret:.+$'
    ConstraintDescription: Must be a valid Secrets Manager ARN

  Schema:
    Type: String
    Description: Schema name for the job. Accepts a single value. Make sure the schema format is as "('SCHEMA')"
    Default: "('sales_data')"
    AllowedPattern: "^\\('[a-zA-Z_][a-zA-Z0-9_]*'\\)$"
    ConstraintDescription: "Must be in format ('schema_name') with valid SQL identifier characters"

  Region:
    Type: String
    Description: Enter Region Name
    Default: 'us-east-1'
    AllowedPattern: '^[a-z]{2}-[a-z]+-\d{1}$'
    ConstraintDescription: Must be a valid AWS region (e.g., us-east-1, eu-west-2)

  TenantName:
    Type: String
    Description: Name of the tenant
    Default: sales_data
    AllowedPattern: '^[a-zA-Z_][a-zA-Z0-9_]{0,127}$'
    ConstraintDescription: Must be a valid identifier (letters, numbers, underscores, max 128 chars)

  RedshiftServerlessPort:
    Type: Number
    Description: Redshift Serverless Port
    Default: 5439
    MinValue: 1024
    MaxValue: 65535

  SecurityGroupSSM:
    Type: String
    Description: SSM parameter name for security group ID
    Default: SecurityGroupId
    AllowedPattern: '^[a-zA-Z0-9_./\-]+$'
    ConstraintDescription: Must be a valid SSM parameter name

  SubnetSSM:
    Type: String
    Description: SSM parameter name for subnet IDs (comma-separated)
    Default: Subnet
    AllowedPattern: '^[a-zA-Z0-9_./\-]+$'
    ConstraintDescription: Must be a valid SSM parameter name

  VpcSSM:
    Type: String
    Description: SSM parameter name for VPC ID
    Default: VpcId
    AllowedPattern: '^[a-zA-Z0-9_./\-]+$'
    ConstraintDescription: Must be a valid SSM parameter name

Resources:

  GlueCloudWatchKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Glue CloudWatch Logs and Job Bookmarks encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

          - Sid: Allow Glue Service
            Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:Encrypt
            Resource: '*'
            Condition:
              StringEquals:
                'aws:RequestedRegion': !Ref 'AWS::Region'
                'kms:ViaService': !Sub 'glue.${AWS::Region}.amazonaws.com'
              ArnLike:
                'kms:EncryptionContext:aws:glue:*': !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:*'

          - Sid: Allow CloudWatch Logs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: '*'


          - Sid: Allow Glue Role
            Effect: Allow
            Principal:
              AWS: !GetAtt GlueServiceRole.Arn
            Action:
              - kms:Decrypt
              - kms:Encrypt
              - kms:GenerateDataKey
              - kms:ReEncrypt
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                'aws:RequestedRegion': !Ref 'AWS::Region'
                'aws:PrincipalArn': !GetAtt GlueServiceRole.Arn
              ArnLike:
                'kms:EncryptionContext:aws:glue:*': !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:*'
                'kms:EncryptionContext:aws:logs:arn': [
                  !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/jobs/*',
                  !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/jobs/glue-security-config-role/*'
                ]

          - Sid: Allow Step Functions CloudWatch Logs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                'aws:RequestedRegion': !Ref 'AWS::Region'
                'kms:ViaService': !Sub 'logs.${AWS::Region}.amazonaws.com'

  # KMS Key Alias
  GlueCloudWatchKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-glue-key'
      TargetKeyId: !Ref GlueCloudWatchKMSKey

  # Glue Security Configuration
  GlueSecurityConfiguration:
    Type: AWS::Glue::SecurityConfiguration
    Properties:
      Name: !Sub "${AWS::StackName}-security-config"
      EncryptionConfiguration:
        CloudWatchEncryption:
          CloudWatchEncryptionMode: SSE-KMS
          KmsKeyArn: !GetAtt GlueCloudWatchKMSKey.Arn
        JobBookmarksEncryption:
          JobBookmarksEncryptionMode: CSE-KMS
          KmsKeyArn: !GetAtt GlueCloudWatchKMSKey.Arn


  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole

  GlueServiceRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: GlueServiceRolePolicy
      Roles:
        - !Ref GlueServiceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:ListStacks
            Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*"

          - Effect: Allow
            Action:
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeRouteTables
              - ec2:CreateNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcAttribute
              - ec2:DescribeVpcs
              - ec2:DescribeAvailabilityZones
              - ec2:DeleteNetworkInterfacePermission
            Resource: "*"

          - Effect: Allow
            Action:
              - iam:PassRole
              - iam:ListRoles
            Resource: "*"
            Condition:
              StringLike:
                iam:PassedToService:
                  - lambda.amazonaws.com
                  - glue.amazonaws.com
                  - redshift.amazonaws.com
                  - redshift-serverless.amazonaws.com

          - Effect: Allow
            Action:
              - iam:ListRolePolicies
              - iam:GetRolePolicy
              - iam:ListRoles
              - iam:GetRole
            Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*"

          - Effect: Allow
            Action: cloudwatch:PutMetricData
            Resource: "*"
            Condition:
              StringEquals:
                'cloudwatch:namespace': ['Glue', 'AWS/Glue']

          - Effect: Allow
            Action:
              - s3:GetBucketLocation
              - s3:ListBucket
              - s3:ListAllMyBuckets
              - s3:GetBucketAcl
            Resource:
              - !Sub "arn:aws:s3:::${BucketName}"
              - !Sub "arn:aws:s3:::${DataBucketName}"

          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - !Sub "arn:aws:s3:::${BucketName}/*"
              - !Sub "arn:aws:s3:::${DataBucketName}/*"

          - Effect: Allow
            Action:
              - redshift-serverless:GetCredentials
              - redshift-serverless:GetWorkgroup
              - redshift-serverless:UpdateWorkgroup
              - redshift-serverless:ListWorkgroups
              - redshift:GetClusterCredentials
              - redshift-data:ExecuteStatement
              - redshift-data:DescribeStatement
              - redshift-data:GetStatementResult
              - redshift-serverless:ListNamespaces
              - redshift-serverless:GetNamespace
              - redshift-serverless:UpdateNamespace
              - redshift:ModifyClusterIamRoles
              - redshift:DescribeClusters
            Resource:
              - !Sub "arn:aws:redshift-serverless:${AWS::Region}:${AWS::AccountId}:workgroup/*"
              - !Sub "arn:aws:redshift-serverless:${AWS::Region}:${AWS::AccountId}:namespace/*"
              - !Sub "arn:aws:redshift:${AWS::Region}:${AWS::AccountId}:cluster:*"

          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:ListSecrets
            Resource:
              -  "*"

          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/jobs/*'
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/python-jobs/*'

          - Effect: Allow
            Action:
                - kms:Decrypt
                - kms:Encrypt
                - kms:GenerateDataKey
            Resource: !GetAtt GlueCloudWatchKMSKey.Arn

          - Effect: Allow
            Action:
                - logs:AssociateKmsKey
            Resource:
                - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/jobs/*'
                - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/python-jobs/*'

  LambdaPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: LambdaPermissionBoundary
      Description: Permission boundary for Lambda execution roles - defines maximum allowed permissions
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Redshift Serverless & Provisioned
          - Effect: Allow
            Action:
              - redshift-serverless:GetCredentials
              - redshift-serverless:GetWorkgroup
              - redshift-serverless:UpdateWorkgroup
              - redshift-serverless:ListWorkgroups
              - redshift-serverless:ListNamespaces
              - redshift-serverless:GetNamespace
              - redshift-serverless:UpdateNamespace
              - redshift:GetClusterCredentials
              - redshift-data:ExecuteStatement
              - redshift-data:DescribeStatement
              - redshift-data:GetStatementResult
            Resource:
              - !Sub "arn:aws:redshift-serverless:${AWS::Region}:${AWS::AccountId}:workgroup/*"
              - !Sub "arn:aws:redshift-serverless:${AWS::Region}:${AWS::AccountId}:namespace/*"
              - !Sub "arn:aws:redshift:${AWS::Region}:${AWS::AccountId}:cluster:*"

          # S3
          # Note: BucketName and DataBucketName are separate parameters that MAY resolve
          # to the same bucket. Both are listed to support split-bucket deployments.
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${BucketName}"
              - !Sub "arn:aws:s3:::${DataBucketName}"

          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
            Resource:
              - !Sub "arn:aws:s3:::${BucketName}/*"
              - !Sub "arn:aws:s3:::${DataBucketName}/*"

          # EC2 / VPC networking (Lambda VPC management requires "*" for ENI operations)
          - Effect: Allow
            Action:
              - ec2:CreateNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:DescribeNetworkInterfaces
              - ec2:AssignPrivateIpAddresses
              - ec2:UnassignPrivateIpAddresses
            Resource: "*"

          # CloudFormation (read + update for tenant stack operations)
          - Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:ListStacks
              - cloudformation:UpdateStack
              - cloudformation:GetTemplateSummary
              - cloudformation:GetTemplate
              - cloudformation:DescribeStackEvents
              - cloudformation:ListStackResources
              - cloudformation:DescribeStackResource
              - cloudformation:DescribeStackResources
            Resource:
              - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*"

          # Secrets Manager
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:CreateSecret
              - secretsmanager:UpdateSecret
              - secretsmanager:PutSecretValue
              - secretsmanager:DescribeSecret
              - secretsmanager:TagResource
              - secretsmanager:UntagResource
              - secretsmanager:DeleteSecret
            Resource:
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*"
          - Effect: Allow
            Action:
              - secretsmanager:ListSecrets
            Resource: "*"

          # IAM (scoped to account)
          - Effect: Allow
            Action:
              - iam:GetRole
              - iam:GetRolePolicy
              - iam:PutRolePolicy
              - iam:UpdateRole
              - iam:UpdateAssumeRolePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:DeleteUserPolicy
              - iam:PutUserPolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:DeleteRolePolicy
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/*"
              - !Sub "arn:aws:iam::${AWS::AccountId}:policy/*"
              - !Sub "arn:aws:iam::${AWS::AccountId}:user/*"
          - Effect: Allow
            Action:
              - iam:GetUser
              - iam:GetUserPolicy
              - iam:CreateUser
              - iam:ListAccessKeys
              - iam:TagUser
              - iam:CreateAccessKey
              - iam:DeleteUser
              - iam:DeleteAccessKey
              - iam:DeleteUserPolicy
              - iam:PutUserPolicy
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:user/*"
          - Effect: Allow
            Action:
              - iam:PassRole
              - iam:ListRoles
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/*"
            Condition:
              StringEquals:
                iam:PassedToService:
                  - lambda.amazonaws.com
                  - glue.amazonaws.com
                  - redshift.amazonaws.com
                  - redshift-serverless.amazonaws.com
                  - events.amazonaws.com
                  - scheduler.amazonaws.com
                  - codebuild.amazonaws.com
                  - kinesisanalytics.amazonaws.com
          - Effect: Allow
            Action:
              - iam:ListRoles
            Resource: "*"

          # SSM
          - Effect: Allow
            Action:
              - ssm:GetParameters
              - ssm:GetParameter
              - ssm:GetParametersByPath
            Resource:
              - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*"

          # Lambda
          - Effect: Allow
            Action:
              - lambda:GetFunction
              - lambda:UpdateFunctionConfiguration
              - lambda:GetFunctionConfiguration
              - lambda:UpdateFunctionCode
              - lambda:ListFunctions
              - lambda:ListTags
              - lambda:TagResource
              - lambda:UntagResource
            Resource:
              - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"

          # EventBridge
          - Effect: Allow
            Action:
              - events:PutTargets
              - events:RemoveTargets
              - events:PutRule
              - events:DeleteRule
              - events:DescribeRule
              - events:EnableRule
              - events:DisableRule
              - events:ListTargetsByRule
            Resource:
              - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/*"

          # CodeBuild
          - Effect: Allow
            Action:
              - codebuild:BatchGetProjects
              - codebuild:BatchGetBuilds
              - codebuild:ListProjects
              - codebuild:StartBuild
              - codebuild:StopBuild
              - codebuild:UpdateProject
            Resource:
              - !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/*"

          # Kinesis Analytics
          - Effect: Allow
            Action:
              - kinesisanalytics:DescribeApplication
              - kinesisanalytics:UpdateApplication
              - kinesisanalytics:StopApplication
              - kinesisanalytics:StartApplication
              - kinesisanalytics:ListTagsForResource
              - kinesisanalytics:TagResource
              - kinesisanalytics:UntagResource
            Resource:
              - !Sub "arn:aws:kinesisanalytics:${AWS::Region}:${AWS::AccountId}:application/*"

          # CloudWatch Logs
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:PutMetricFilter
              - logs:DeleteMetricFilter
              - logs:DescribeMetricFilters
            Resource:
              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    DependsOn: LambdaPermissionBoundary
    Properties:
      PermissionsBoundary: !Ref LambdaPermissionBoundary
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RedshiftAndSecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - redshift-serverless:GetCredentials
                  - redshift-serverless:GetWorkgroup
                  - redshift-data:ExecuteStatement
                  - redshift-data:DescribeStatement
                  - redshift-data:GetStatementResult
                  - redshift-serverless:UpdateWorkgroup
                  - redshift-serverless:ListWorkgroups
                  - redshift:GetClusterCredentials
                  - redshift-serverless:ListNamespaces
                  - redshift-serverless:GetNamespace
                  - redshift-serverless:UpdateNamespace

                Resource:
                  - "arn:aws:redshift-serverless:*:*:workgroup/*"
                  - "arn:aws:redshift-serverless:*:*:namespace/*"

              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${DataBucketName}"

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}/*"
                  - !Sub "arn:aws:s3:::${DataBucketName}/*"

              # VPC permissions - Lambda VPC management requires "*" for ENI operations
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: "*"

              # CloudFormation permissions
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                  - cloudformation:UpdateStack
                  - cloudformation:GetTemplateSummary
                  - cloudformation:GetTemplate
                  - cloudformation:DescribeStackEvents
                  - cloudformation:ListStackResources
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                Resource:
                  -  !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*"

              # Extended Secrets Manager permissions
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:DeleteSecret
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*"

              - Effect: Allow
                Action:
                  - secretsmanager:ListSecrets
                Resource: "*"

              # IAM permissions
              - Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PutRolePolicy
                  - iam:UpdateRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:DeleteUserPolicy
                  - iam:PutUserPolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:DeleteRolePolicy
                Resource:
                  - "arn:aws:iam::*:role/*"
                  - "arn:aws:iam::*:policy/*"
                  - "arn:aws:iam::*:user/*"

              - Effect: Allow
                Action:
                  - iam:GetUser
                  - iam:GetUserPolicy
                  - iam:CreateUser
                  - iam:ListAccessKeys
                  - iam:TagUser
                  - iam:CreateAccessKey
                  - iam:DeleteUser
                  - iam:DeleteAccessKey
                  - iam:DeleteUserPolicy
                  - iam:PutUserPolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:user/*"

              - Effect: Allow
                Action:
                  - kinesisanalytics:DescribeApplication
                  - kinesisanalytics:UpdateApplication
                  - kinesisanalytics:StopApplication
                  - kinesisanalytics:StartApplication
                  - kinesisanalytics:ListTagsForResource
                  - kinesisanalytics:TagResource
                  - kinesisanalytics:UntagResource
                Resource: !Sub 'arn:aws:kinesisanalytics:${AWS::Region}:${AWS::AccountId}:application/*'


              - Effect: Allow
                Action:
                  - iam:PassRole
                  - iam:ListRoles
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*"
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - lambda.amazonaws.com
                      - glue.amazonaws.com
                      - redshift.amazonaws.com
                      - redshift-serverless.amazonaws.com
                      - events.amazonaws.com
                      - scheduler.amazonaws.com
                      - codebuild.amazonaws.com
                      - kinesisanalytics.amazonaws.com


              - Effect: Allow
                Action: iam:ListRoles
                Resource: "*"

              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*"


              - Effect: Allow
                Action:
                  - lambda:GetFunction
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:ListFunctions
                  - lambda:ListTags
                  - lambda:TagResource
                  - lambda:UntagResource
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"


              - Effect: Allow
                Action:
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:PutRule
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:EnableRule
                  - events:DisableRule
                  - events:ListTargetsByRule
                Resource:
                  - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/*"

              - Effect: Allow
                Action:
                  - codebuild:BatchGetProjects
                  - codebuild:BatchGetBuilds
                  - codebuild:ListProjects
                  - codebuild:StartBuild
                  - codebuild:StopBuild
                  - codebuild:UpdateProject
                Resource:
                  - !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/*"

              - Effect: Allow
                Action:
                  - logs:PutMetricFilter
                  - logs:DeleteMetricFilter
                  - logs:DescribeMetricFilters
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"


  RedshiftConnectorLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: redshift-connector-layer
      Description: Layer containing redshift_connector package
      Content:
        S3Bucket: !Ref BucketName
        S3Key: redshift-tenant-migration/layers/redshift_connector.zip  # Make sure this zip exists in your S3 bucket
      CompatibleRuntimes:
        - python3.9
        - python3.13
      CompatibleArchitectures:
        - x86_64

  NetworkConfigFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # SSM Parameter Access
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:DescribeParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*"

              # EC2 Security Group Describe Actions - requires "*"
              - Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                Resource: "*"
                # EC2 Describe APIs only support "*" as resource

